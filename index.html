<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Fanieee ❤️</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floating hearts (always on screen) -->
  <div class="hearts">
    <span>💖</span><span>💛</span><span>❤️</span><span>💜</span><span>🤍</span>
    <span>💖</span><span>💛</span><span>❤️</span><span>💜</span><span>🤍</span>
  </div>

  <div class="container fade-in">

    <!-- Title -->
    <h1 class="title">Happy Birthday Fanieee ❤️</h1>

    <!-- Typewriter Intro Message -->
    <p class="love-text" id="typewriter"></p>

    <!-- Surprise Button -->
    <button class="surprise-btn" onclick="showMessage()">Click Me 🎁</button>

    <!-- Favorite Moments Gallery -->
    <h2 class="section-title">My wiwiwi ❤️</h2>
    <div class="gallery">
      <img src="images/photo1.jpg" class="slide" />
      <img src="images/photo2.jpg" class="slide" />
      <img src="images/photo3.jpg" class="slide" />
      <img src="images/photo4.jpg" class="slide" />
      <img src="images/photo5.jpg" class="slide" />
      <img src="images/photo6.jpg" class="slide" />
      <img src="images/photo7.jpg" class="slide" />
      <img src="images/photo8.jpg" class="slide" />
    </div>

    <!-- Song Section -->
    <h2 class="section-title">Our Song 🎧</h2>
    <div class="spotify-box">
      <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/track/6RRMrws5dVKALzhTvH8GFL?utm_source=generator"
        width="100%" height="352" frameBorder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"></iframe>
    </div>

    <!-- Appreciation Card -->
    <div class="thankyou-card fade-in">
      <p>I love you for the peace you bring into my life,<br>
      for the way your presence makes everything feel calm,<br>
      for believing in us even when things get hard ❤️</p>
    </div>

    <!-- Extra Confetti Surprise -->
    <button class="surprise-btn extra" onclick="extraConfetti()">Click for More Surprise 🎉</button>

    <!-- Footer -->
    <p class="footer">Made with ❤️ by Faizan</p>

  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
